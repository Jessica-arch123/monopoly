<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaPoly: Neon Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6c5ce7; --accent: #00d2d3; --bg: #0f172a; --card: rgba(255, 255, 255, 0.1); --gold: #feca57; --pink: #ff9ff3; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 10px; margin: 0; min-height: 100vh; }
        
        .game-container { background: #1e293b; width: 100%; max-width: 480px; border-radius: 40px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        /* Neon Board Layout */
        .board-track { 
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); 
            gap: 10px; padding: 20px; background: rgba(0,0,0,0.2); height: 380px; position: relative;
        }
        .tile { 
            background: var(--card); backdrop-filter: blur(10px); border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 0.75rem; font-weight: 700; color: #cbd5e1; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.4s; text-align: center;
        }
        .tile-active { background: var(--primary); color: white; box-shadow: 0 0 20px var(--primary); border: none; transform: scale(1.05); }
        .tile-start { background: var(--accent); color: white; }

        /* Animated Player Piece */
        #playerPiece { 
            position: absolute; font-size: 2.5rem; z-index: 100;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Central UI */
        .center-ui { padding: 30px 20px; text-align: center; border-radius: 40px 40px 0 0; background: #1e293b; margin-top: -20px; position: relative; z-index: 10; }
        .btn-roll { 
            background: linear-gradient(135deg, var(--primary), #a29bfe); 
            width: 80%; padding: 18px; border: none; border-radius: 20px; color: white; 
            font-weight: 900; font-size: 1.2rem; cursor: pointer; letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3); transition: 0.3s;
        }
        .btn-roll:active { transform: scale(0.95); }

        /* Stats Bar */
        .stats-bar { display: flex; justify-content: space-around; padding: 20px; background: rgba(0,0,0,0.3); font-size: 0.9rem; font-weight: 700; color: var(--accent); }
        
        /* Question Overlay */
        .question-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.95); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .q-card { background: #1e293b; padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; border: 1px solid var(--primary); text-align: center; }
        .btn-mcq { background: var(--card); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-bottom: 10px; width: 100%; cursor: pointer; font-family: 'Outfit'; font-weight: 700; transition: 0.3s; }
        .btn-mcq:hover { background: var(--primary); }

        sub, sup { font-size: 0.7em; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="board-track" id="board">
        <div class="tile tile-start" id="t0">GO</div>
        <div class="tile" id="t1">SO<sub>2</sub></div>
        <div class="tile" id="t2">NaOH</div>
        <div class="tile" id="t3" style="color:var(--pink)">CHANCE</div>
        <div class="tile" id="t11">Ag<sup>+</sup></div>
        <div style="grid-column: span 2; grid-row: span 2; display:flex; flex-direction:column; align-items:center; justify-content:center;">
             <span style="font-size:3rem; opacity:0.3">🧪</span>
             <small style="opacity:0.3; letter-spacing:2px">PHARMAPOLY</small>
        </div>
        <div class="tile" id="t4">PCl<sub>5</sub></div>
        <div class="tile" id="t10">Buffer</div>
        <div class="tile" id="t5">Ni(CO)<sub>4</sub></div>
        <div class="tile" id="t9">O<sub>2</sub><sup>+</sup></div>
        <div class="tile" id="t8">SF<sub>6</sub></div>
        <div class="tile" id="t7" style="color:var(--pink)">CHANCE</div>
        <div class="tile" id="t6">KOH</div>
        
        <div id="playerPiece">🐱</div>
    </div>

    <div class="center-ui">
        <h2 id="tileTitle" style="margin:0; color:var(--accent)">PHASE: START</h2>
        <p id="feedback" style="font-size: 0.9rem; color: #94a3b8; margin: 15px 0 25px 0; min-height: 20px;">Ready for research?</p>
        <button class="btn-roll" onclick="rollDice()">ROLL DICE</button>
    </div>

    <div class="stats-bar">
        <span>💰 <span id="score">0</span> PTS</span>
        <span>💎 <span id="rank">INITIATE</span></span>
    </div>
</div>

<div class="question-overlay" id="qOverlay">
    <div class="q-card">
        <h3 id="qTitle" style="color:var(--accent); margin-top:0;">DATA ANALYSIS</h3>
        <p id="qText" style="line-height:1.6; font-size:1.1rem;"></p>
        <div id="optionsArea"></div>
        <div id="calcArea" style="display:none">
            <input type="number" id="calcInput" style="width:100%; padding:15px; border-radius:15px; background:var(--bg); border:1px solid #333; color:white; text-align:center; font-size:1.2rem;">
            <button class="btn-roll" style="margin-top:20px; width:100%" onclick="checkCalc()">SUBMIT</button>
        </div>
    </div>
</div>

<script>
    const boardItems = [
        { name: "GO", type: "start" },
        { name: "SO2 Lab", lvl: 1, type: "q" },
        { name: "NaOH Unit", lvl: 1, type: "q" },
        { name: "Grant Chance", type: "chance" },
        { name: "PCl5 Orbit", lvl: 2, type: "q" },
        { name: "Ni-Carbonyl", lvl: 2, type: "q" },
        { name: "KOH Station", lvl: 2, type: "q" },
        { name: "Scholarship", type: "chance" },
        { name: "SF6 Octa", lvl: 2, type: "q" },
        { name: "O2 Cation", lvl: 3, type: "q" },
        { name: "Buffer Zone", lvl: 3, type: "q" },
        { name: "Ag-Solubility", lvl: 2, type: "q" }
    ];

    const questions = [
        { lvl: 1, isMCQ: true, text: "Geometry of SO<sub>2</sub>?", options: ["Linear", "Bent", "T-shaped", "Trigonal"], correct: "Bent" },
        { lvl: 1, text: "NaOH (MW:40) for 1.5L of 0.1M? (grams)", calc: () => 6.00 },
        { lvl: 2, isMCQ: true, text: "Hybridisation of P in PCl<sub>5</sub>?", options: ["sp<sup>3</sup>", "sp<sup>3</sup>d", "sp<sup>3</sup>d<sup>2</sup>", "dsp<sup>2</sup>"], correct: "sp<sup>3</sup>d" },
        { lvl: 3, isMCQ: true, text: "Bond order for O<sub>2</sub><sup>+</sup>?", options: ["1.5", "2.0", "2.5", "3.0"], correct: "2.5" },
        { lvl: 3, text: "Buffer: [A<sup>-</sup>]=0.5, [HA]=0.05, pK<sub>a</sub>=3.8. pH?", calc: () => 4.80 }
    ];

    let state = { pos: 0, score: 0 };

    function rollDice() {
        const roll = Math.floor(Math.random() * 3) + 1;
        movePlayer(roll);
    }

    function movePlayer(steps) {
        state.pos = (state.pos + steps) % 12;
        updatePiece();
        setTimeout(() => handleLanding(), 600);
    }

    function updatePiece() {
        const tile = document.getElementById('t' + state.pos);
        const piece = document.getElementById('playerPiece');
        piece.style.left = (tile.offsetLeft + tile.offsetWidth/2 - 20) + 'px';
        piece.style.top = (tile.offsetTop + tile.offsetHeight/2 - 25) + 'px';
        document.querySelectorAll('.tile').forEach(t => t.classList.remove('tile-active'));
        tile.classList.add('tile-active');
    }

    function handleLanding() {
        const land = boardItems[state.pos];
        document.getElementById('tileTitle').innerText = land.name;
        if (land.type === "start") {
            state.score += 100;
            document.getElementById('feedback').innerText = "Passed GO! Grants +100 PTS 🎓";
            sync();
        } else if (land.type === "chance") {
            const win = Math.random() > 0.5;
            state.score += win ? 50 : -30;
            document.getElementById('feedback').innerText = win ? "Research Grant! +50 PTS" : "Lab Spill... -30 PTS";
            sync();
        } else {
            showQuestion(land.lvl);
        }
    }

    function showQuestion(lvl) {
        const pool = questions.filter(q => q.lvl === lvl);
        const q = pool[Math.floor(Math.random() * pool.length)];
        window.currentQ = q;
        document.getElementById('qText').innerHTML = q.text;
        document.getElementById('qOverlay').style.display = 'flex';
        const optArea = document.getElementById('optionsArea');
        const calcArea = document.getElementById('calcArea');
        optArea.innerHTML = '';
        if (q.isMCQ) {
            calcArea.style.display = 'none';
            optArea.style.display = 'block';
            q.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = "btn-mcq"; b.innerHTML = opt;
                b.onclick = () => processAnswer(opt === q.correct);
                optArea.appendChild(b);
            });
        } else {
            optArea.style.display = 'none';
            calcArea.style.display = 'block';
        }
    }

    function processAnswer(isCorrect) {
        if (isCorrect) {
            state.score += 50;
            document.getElementById('feedback').innerText = "Correct Analysis! +50 PTS 🧪";
        } else {
            state.score -= 20;
            document.getElementById('feedback').innerText = "Analysis Failed... -20 PTS 💀";
        }
        document.getElementById('qOverlay').style.display = 'none';
        sync();
    }

    function checkCalc() {
        const val = parseFloat(document.getElementById('calcInput').value);
        processAnswer(Math.abs(val - window.currentQ.calc()) < 0.1);
        document.getElementById('calcInput').value = '';
    }

    function sync() {
        document.getElementById('score').innerText = state.score;
        let r = "INITIATE";
        if(state.score > 200) r = "RESEARCHER";
        if(state.score > 500) r = "LAB MANAGER";
        document.getElementById('rank').innerText = r;
    }

    window.onload = updatePiece;
</script>
</body>
</html>
