<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemistryPoly by YAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6c5ce7; --accent: #00d2d3; --bg: #0f172a; --card: rgba(255, 255, 255, 0.1); --gold: #feca57; --pink: #ff9ff3; --red: #ff7675; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 10px; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .game-container { background: #1e293b; width: 100%; max-width: 600px; border-radius: 40px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; }
        .screen { display: none; padding: 20px; text-align: center; }
        .active { display: block; }
        .board-track { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(7, 1fr); gap: 4px; padding: 10px; background: rgba(0,0,0,0.2); height: 450px; position: relative; }
        .tile { background: var(--card); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 700; color: #cbd5e1; border: 1px solid transparent; text-align: center; line-height: 1.1; position: relative; overflow: hidden; }
        .owner-tag { position: absolute; top: -5px; font-size: 1.2rem; filter: drop-shadow(0 0 3px black); z-index: 10; }
        .player-piece { position: absolute; font-size: 1.4rem; z-index: 100; transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); pointer-events: none; }
        .center-space { grid-column: 2 / 7; grid-row: 2 / 7; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.1; font-size: 1.5rem; font-weight: 900; }
        .dice-container { perspective: 1000px; width: 50px; height: 50px; margin: 0 auto; }
        .dice { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }
        .dice-face { position: absolute; width: 50px; height: 50px; background: white; border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: 900; font-size: 1.5rem; }
        .face-1 { transform: translateZ(25px); } .face-2 { transform: rotateY(180deg) translateZ(25px); } .face-3 { transform: rotateY(90deg) translateZ(25px); }
        .rolling { animation: spin 0.2s infinite linear; }
        @keyframes spin { from { transform: rotateX(0deg) rotateY(0deg); } to { transform: rotateX(360deg) rotateY(360deg); } }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 8px; }
        .btn-start { background: var(--accent); }
        .btn-roll { background: var(--primary); width: 60%; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .q-card { background: #1e293b; padding: 25px; border-radius: 30px; width: 100%; max-width: 420px; border: 2px solid var(--primary); text-align: center; }
        .btn-mcq { background: var(--card); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; margin-bottom: 6px; width: 100%; cursor: pointer; text-align: left; font-size: 0.9rem; }
        .p-stat { text-align: center; padding: 5px; opacity: 0.3; flex: 1; border-radius: 8px; }
        .p-stat.active-turn { opacity: 1; border: 1px solid var(--primary); background: rgba(255,255,255,0.1); }
        sub, sup { font-size: 0.75em; line-height: 0; position: relative; vertical-align: baseline; }
        sub { bottom: -0.25em; } sup { top: -0.5em; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="screen-lobby" class="screen active">
        <span style="color:var(--accent); font-weight:700;">BY YAN</span>
        <h1>ChemistryPoly</h1>
        <p>1-4 Players | Pharmacy Module Edition</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0;">
            <div class="char-card" id="card0" onclick="togglePlayer(0)" style="background:var(--card); padding:10px; border-radius:15px; cursor:pointer;"><span>🐱</span><br><small>CAT-ALYST</small></div>
            <div class="char-card" id="card1" onclick="togglePlayer(1)" style="background:var(--card); padding:10px; border-radius:15px; cursor:pointer;"><span>🐶</span><br><small>DOG-MA</small></div>
            <div class="char-card" id="card2" onclick="togglePlayer(2)" style="background:var(--card); padding:10px; border-radius:15px; cursor:pointer;"><span>🦊</span><br><small>FOX-PHATE</small></div>
            <div class="char-card" id="card3" onclick="togglePlayer(3)" style="background:var(--card); padding:10px; border-radius:15px; cursor:pointer;"><span>🐰</span><br><small>BUN-SEN</small></div>
        </div>
        <button class="btn btn-start" id="startBtn" disabled onclick="startQualification()">START QUALIFICATION</button>
    </div>

    <div id="screen-qualify" class="screen">
        <h2 style="color:var(--gold)">STAGE 1: GRANTS 🧪</h2>
        <p id="qualifyText">Correctly answer 2 questions to start!</p>
        <div id="qualifyArea"></div>
    </div>

    <div id="screen-game" class="screen">
        <div class="board-track" id="board">
            <div class="center-space">YAN<br><small style="font-size:0.5rem">CHEMISTRYPOLY</small></div>
            <div id="piecesContainer"></div>
        </div>
        <div class="center-ui">
            <div class="dice-container" onclick="rollDice()">
                <div id="dice" class="dice"><div class="dice-face face-1">1</div><div class="dice-face face-2">2</div><div class="dice-face face-3">3</div></div>
            </div>
            <h4 id="statusLabel" style="margin:5px 0; font-size:0.8rem;"></h4>
            <button id="rollBtn" class="btn btn-roll" onclick="rollDice()">ROLL DICE</button>
        </div>
        <div id="dashboard" style="display:flex; background:rgba(0,0,0,0.4); padding:10px;"></div>
    </div>
</div>

<div class="overlay" id="qOverlay"><div class="q-card"><h3 id="qHeader">RESEARCH TASK</h3><p id="qText"></p><div id="optionsArea"></div></div></div>

<script>
    const sounds = {
        roll: new Audio('https://www.soundjay.com/buttons/button-27.mp3'),
        correct: new Audio('https://www.soundjay.com/buttons/button-3.mp3'),
        wrong: new Audio('https://www.soundjay.com/buttons/button-10.mp3')
    };
    function play(t){ sounds[t].currentTime=0; sounds[t].play().catch(()=>{}); }

    const questions = [
        { text: "Definition of Molarity (M)?", options: ["Moles per Liter solution", "Moles per kg solvent", "Grams per Liter", "Mole fraction"], correct: "Moles per Liter solution" },
        { text: "Definition of Molality (m)?", options: ["Moles per Liter solution", "Moles per kg solvent", "Mole fraction", "Grams per Liter"], correct: "Moles per kg solvent" },
        { text: "Percentage w/v is defined as:", options: ["Grams of solute in 100mL solution", "Grams in 100g", "mL in 100mL", "Moles in 1L"], correct: "Grams of solute in 100mL solution" },
        { text: "Henderson-Hasselbalch: pH = pK<sub>a</sub> + log(___)", options: ["[A<sup>-</sup>]/[HA]", "[HA]/[A<sup>-</sup>]", "[OH<sup>-</sup>]/[H<sup>+</sup>]", "K<sub>w</sub>"], correct: "[A<sup>-</sup>]/[HA]" },
        { text: "IUPAC name for [Co(NH<sub>3</sub>)<sub>6</sub>]Cl<sub>3</sub>?", options: ["Hexaamminecobalt(III) chloride", "Cobalt hexaammine chloride", "Hexaamminecobaltate", "Trichlorocobalt ammine"], correct: "Hexaamminecobalt(III) chloride" },
        { text: "Grams of NaOH (MW:40) for 500mL of 0.1M?", options: ["2.0g", "1.0g", "4.0g", "0.5g"], correct: "2.0g" },
        { text: "VSEPR shape of NH<sub>3</sub>?", options: ["Trigonal Pyramidal", "Trigonal Planar", "Tetrahedral", "Bent"], correct: "Trigonal Pyramidal" },
        { text: "Hybridization for 5 electron pairs (PCl<sub>5</sub>)?", options: ["sp<sup>3</sup>d", "sp<sup>3</sup>", "sp<sup>3</sup>d<sup>2</sup>", "sp<sup>2</sup>"], correct: "sp<sup>3</sup>d" },
        { text: "Paramagnetism of O<sub>2</sub> is explained by:", options: ["MO Theory", "VSEPR", "Valence Bond", "Lewis"], correct: "MO Theory" },
        { text: "The Mohr Method uses which indicator?", options: ["K<sub>2</sub>CrO<sub>4</sub>", "Fe<sup>3+</sup>", "Phenolphthalein", "Erio-T"], correct: "K<sub>2</sub>CrO<sub>4</sub>" },
        { text: "Standardizing EDTA requires:", options: ["ZnSO<sub>4</sub> or CaCO<sub>3</sub>", "NaOH", "HCl", "KMnO<sub>4</sub>"], correct: "ZnSO<sub>4</sub> or CaCO<sub>3</sub>" },
        { text: "The Volhard Method involves:", options: ["Back titration", "Direct titration", "Complexometric", "Redox"], correct: "Back titration" },
        { text: "Redox indicator for Iodine titration?", options: ["Starch", "Phenolphthalein", "Methyl Orange", "Erio-T"], correct: "Starch" },
        { text: "EDTA is a ___ ligand.", options: ["Hexadentate", "Bidentate", "Monodentate", "Tridentate"], correct: "Hexadentate" },
        { text: "Accuracy is defined as:", options: ["Closeness to true value", "Reproducibility", "Method speed", "Error rate"], correct: "Closeness to true value" },
        { text: "Precision is defined as:", options: ["Reproducibility", "True value", "Method speed", "Linearity"], correct: "Reproducibility" },
        { text: "IUPAC for [Ag(NH<sub>3</sub>)<sub>2</sub>]<sup>+</sup>?", options: ["Diamminesilver(I) ion", "Silver diamine ion", "Argentum ion", "Diamine argentate"], correct: "Diamminesilver(I) ion" },
        { text: "IUPAC for [Fe(H<sub>2</sub>O)<sub>6</sub>]<sup>2+</sup>?", options: ["Hexaaquairon(II) ion", "Hexaaquaironate", "Iron hexahydrate", "Hexaaquaferrate(II)"], correct: "Hexaaquairon(II) ion" },
        { text: "Bond order for O<sub>2</sub><sup>+</sup>?", options: ["2.5", "2.0", "1.5", "3.0"], correct: "2.5" },
        { text: "EDTA indicator at pH 12 for Calcium?", options: ["Murexide", "Erio-T", "Xylenol Orange", "Starch"], correct: "Murexide" },
        { text: "Bond order for N<sub>2</sub>?", options: ["3.0", "2.0", "2.5", "1.0"], correct: "3.0" },
        { text: "Hybridization of C in CH<sub>4</sub>?", options: ["sp<sup>3</sup>", "sp<sup>2</sup>", "sp", "dsp<sup>2</sup>"], correct: "sp<sup>3</sup>" },
        { text: "Buffering capacity is maximum when:", options: ["pH = pK<sub>a</sub>", "pH = 7", "pH = 1", "pH = pK<sub>b</sub>"], correct: "pH = pK<sub>a</sub>" },
        { text: "Bronsted-Lowry base is a:", options: ["Proton acceptor", "Proton donor", "Electron donor", "Hydroxyl source"], correct: "Proton acceptor" },
        { text: "Mole fraction of A is defined as:", options: ["Moles A / Total moles", "Moles A / kg solvent", "Grams A / Volume", "Moles A / Moles B"], correct: "Moles A / Total moles" },
        { text: "Shape of PCl<sub>5</sub>?", options: ["Trigonal Bipyramidal", "Octahedral", "Tetrahedral", "Linear"], correct: "Trigonal Bipyramidal" },
        { text: "Primary Standard requirements?", options: ["High purity and stability", "Low MW", "Hygroscopic", "Volatile"], correct: "High purity and stability" },
        { text: "Permanganate titration (KMnO<sub>4</sub>) is:", options: ["Self-indicating", "Uses Starch", "Uses Litmus", "Needs Murexide"], correct: "Self-indicating" },
        { text: "Titrand (Analyte) is usually in the:", options: ["Conical flask", "Burette", "Pipette", "Volumetric flask"], correct: "Conical flask" },
        { text: "Secondary standards are standardized against:", options: ["Primary Standard", "Indicator", "Solvent", "Beaker"], correct: "Primary Standard" }
    ];

    const tileNames = ["GO", "Molarity", "IUPAC", "AUDIT", "EDTA", "Redox", "Molality", "Mohr", "Buffer", "AUDIT", "pH/pK<sub>a</sub>", "Volhard", "K<sub>sp</sub>", "Precision", "VSEPR", "Henderson", "AUDIT", "Mole Frac", "Iodine", "NaOH Calc", "HCl Calc", "Hybridize", "AUDIT", "Accuracy"];

    let allChars = [{id:0, icon:'🐱', active:false},{id:1, icon:'🐶', active:false},{id:2, icon:'🦊', active:false},{id:3, icon:'🐰', active:false}];
    let players = [], turn = 0, rolling = false, owners = {}, qCount = 0;

    function togglePlayer(id){
        allChars[id].active = !allChars[id].active;
        document.getElementById('card'+id).style.borderColor = allChars[id].active ? 'var(--accent)' : 'transparent';
        document.getElementById('startBtn').disabled = allChars.filter(c=>c.active).length < 1;
    }

    function startQualification(){
        players = allChars.filter(c=>c.active).map(c=>({...c, pos:0, pts:0, doneQual:false}));
        document.getElementById('screen-lobby').style.display = 'none';
        document.getElementById('screen-qualify').style.display = 'block';
        runQualify();
    }

    function runQualify(){
        let p = players.find(x => !x.doneQual);
        if(!p) { 
            document.getElementById('screen-qualify').style.display = 'none';
            document.getElementById('screen-game').style.display = 'block';
            initBoard(); 
            return; 
        }
        document.getElementById('qualifyText').innerHTML = `${p.icon}'s Exam (Q ${qCount+1}/2)`;
        const q = questions[Math.floor(Math.random()*questions.length)];
        const area = document.getElementById('qualifyArea');
        area.innerHTML = `<p>${q.text}</p>`;
        q.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'btn btn-mcq'; b.innerHTML = opt;
            b.onclick = () => {
                if(opt === q.correct){ p.pts += 150; play('correct'); } else { play('wrong'); }
                qCount++;
                if(qCount >= 2){ p.doneQual = true; qCount = 0; }
                runQualify();
            };
            area.appendChild(b);
        });
    }

    function initBoard(){
        const board = document.getElementById('board');
        let tileIndices = [0,1,2,3,4,5,6, 23,-1,-1,-1,-1,-1,7, 22,-1,-1,-1,-1,-1,8, 21,-1,-1,-1,-1,-1,9, 20,-1,-1,-1,-1,-1,10, 19,18,17,16,15,14,13,12];
        tileIndices.forEach((idx, i) => {
            if(idx === -1) return;
            const t = document.createElement('div'); t.id = 't'+idx; t.className = 'tile';
            if(tileNames[idx] === "AUDIT") t.style.background = "var(--red)";
            t.innerHTML = `${tileNames[idx]}`;
            t.style.gridRow = Math.floor(i/7)+1; t.style.gridColumn = (i%7)+1;
            board.appendChild(t);
        });
        const dash = document.getElementById('dashboard');
        players.forEach((p, i) => {
            const pc = document.createElement('div'); pc.id = 'piece'+p.id; pc.className = 'player-piece'; pc.innerText = p.icon;
            document.getElementById('piecesContainer').appendChild(pc);
            const st = document.createElement('div'); st.id = 'stat'+i; st.className = 'p-stat'+(i===0?' active-turn':'');
            st.innerHTML = `<span>${p.icon}</span><br><b id="pts${i}">${p.pts}</b>`;
            dash.appendChild(st);
        });
        updateStatus(); updatePieces();
    }

    function rollDice(){
        if(rolling) return; rolling = true; play('roll');
        const d = document.getElementById('dice'); d.classList.add('rolling');
        const r = Math.floor(Math.random()*3)+1;
        setTimeout(()=>{
            d.classList.remove('rolling');
            d.style.transform = r===1?"rotateY(0deg)":r===2?"rotateY(180deg)":"rotateY(-90deg)";
            setTimeout(()=>{ movePlayer(r); rolling=false; }, 500);
        }, 800);
    }

    function movePlayer(s){
        let p = players[turn]; let old = p.pos; p.pos = (p.pos + s) % 24;
        if(p.pos < old) { play('win'); alert(`${p.icon} Won! 🏆`); location.reload(); }
        updatePieces(); setTimeout(()=>handleLanding(p), 600);
    }

    function handleLanding(p){
        if(p.pos === 0) { p.pts += 100; play('correct'); endTurn(); return; }
        if(tileNames[p.pos] === "AUDIT") { p.pts -= 50; alert("Audit Penalty: -50 PTS"); endTurn(); return; }
        if(owners[p.pos] !== undefined && owners[p.pos] !== turn){
            let owner = players[owners[p.pos]]; p.pts -= 80; owner.pts += 80;
            alert(`Rent! Paid 80 PTS to ${owner.icon}`);
            setTimeout(()=> showQuestion(p.pos, p, true), 800);
        } else { showQuestion(p.pos, p, false); }
    }

    function showQuestion(tid, p, isPenalty){
        const q = questions[Math.floor(Math.random()*questions.length)];
        document.getElementById('qOverlay').style.display = 'flex';
        document.getElementById('qHeader').innerText = isPenalty ? "PENALTY AUDIT" : "RESEARCH TASK";
        document.getElementById('qText').innerHTML = q.text;
        const area = document.getElementById('optionsArea'); area.innerHTML = '';
        q.options.forEach(opt => {
            const b = document.createElement('button'); b.className = 'btn-mcq'; b.innerHTML = opt;
            b.onclick = () => {
                if(opt === q.correct){
                    play('correct');
                    if(!isPenalty && owners[tid] === undefined){
                        owners[tid] = turn;
                        document.getElementById('t'+tid).innerHTML += `<span class="owner-tag">${p.icon}</span>`;
                    }
                } else {
                    play('wrong'); if(isPenalty) p.pts -= 40;
                }
                document.getElementById('qOverlay').style.display = 'none';
                endTurn();
            };
            area.appendChild(b);
        });
    }

    function endTurn(){
        players.forEach((p, i) => document.getElementById('pts'+i).innerText = p.pts);
        document.getElementById('stat'+turn).classList.remove('active-turn');
        turn = (turn+1)%players.length;
        document.getElementById('stat'+turn).classList.add('active-turn');
        updateStatus();
    }

    function updateStatus(){ document.getElementById('statusLabel').innerText = players[turn].icon + "'S TURN"; }
    function updatePieces(){
        players.forEach((p, i) => {
            const t = document.getElementById('t'+p.pos); const pc = document.getElementById('piece'+p.id);
            if(t && pc){ pc.style.left = (t.offsetLeft + (i%2)*10 + 2)+'px'; pc.style.top = (t.offsetTop + Math.floor(i/2)*10 + 2)+'px'; }
        });
    }
</script>
</body>
</html>
