<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaPoly: Multiplayer Lobby</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6c5ce7; --accent: #00d2d3; --bg: #0f172a; --card: rgba(255, 255, 255, 0.1); --gold: #feca57; --pink: #ff9ff3; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 10px; margin: 0; min-height: 100vh; }
        
        .game-container { background: #1e293b; width: 100%; max-width: 500px; border-radius: 40px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        /* Lobby Styles */
        .lobby-screen { padding: 30px; text-align: center; }
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .char-card { background: var(--card); padding: 15px; border-radius: 20px; border: 2px solid transparent; cursor: pointer; transition: 0.3s; }
        .char-card.selected { border-color: var(--accent); background: rgba(0, 210, 211, 0.2); }
        .char-icon { font-size: 2.5rem; display: block; margin-bottom: 5px; }

        /* Board & UI (Hidden initially) */
        .game-screen { display: none; }
        .board-track { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 8px; padding: 15px; background: rgba(0,0,0,0.2); height: 360px; position: relative; }
        .tile { background: var(--card); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; color: #cbd5e1; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .player-piece { position: absolute; font-size: 1.8rem; z-index: 100; transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }

        .center-ui { padding: 20px; text-align: center; background: #1e293b; border-top: 1px solid rgba(255,255,255,0.1); }
        .dice-container { perspective: 1000px; width: 50px; height: 50px; margin: 0 auto 15px; }
        .dice { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
        .dice-face { position: absolute; width: 50px; height: 50px; background: white; border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: 900; }
        .face-1 { transform: translateZ(25px); } .face-2 { transform: rotateY(180deg) translateZ(25px); } .face-3 { transform: rotateY(90deg) translateZ(25px); }
        .rolling { animation: spin 0.2s infinite linear; }
        @keyframes spin { from { transform: rotateX(0deg) rotateY(0deg); } to { transform: rotateX(360deg) rotateY(360deg); } }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 15px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-start { background: var(--accent); margin-top: 20px; }
        .btn-roll { background: var(--primary); width: 70%; }
        
        .player-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); background: rgba(0,0,0,0.3); padding: 10px; }
        .p-stat { text-align: center; padding: 5px; opacity: 0.4; transition: 0.3s; }
        .p-stat.active-turn { opacity: 1; transform: scale(1.1); color: var(--accent); }

        .question-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .q-card { background: #1e293b; padding: 30px; border-radius: 30px; width: 85%; max-width: 400px; border: 2px solid var(--primary); text-align: center; }
        .btn-mcq { background: var(--card); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; margin-bottom: 8px; width: 100%; cursor: pointer; font-family: 'Outfit'; font-weight: 700; }
        sub, sup { font-size: 0.7em; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="screen-lobby" class="lobby-screen active">
        <h2 style="color:var(--accent)">Research Lobby</h2>
        <p>Tap characters to join the session (2-4 players)</p>
        <div class="char-grid">
            <div class="char-card" id="card0" onclick="togglePlayer(0)">
                <span class="char-icon">🐱</span><small>CAT-ALYST</small>
            </div>
            <div class="char-card" id="card1" onclick="togglePlayer(1)">
                <span class="char-icon">🐶</span><small>DOG-MA</small>
            </div>
            <div class="char-card" id="card2" onclick="togglePlayer(2)">
                <span class="char-icon">🦊</span><small>FOX-PHATE</small>
            </div>
            <div class="char-card" id="card3" onclick="togglePlayer(3)">
                <span class="char-icon">🐰</span><small>BUN-SEN</small>
            </div>
        </div>
        <button class="btn btn-start" id="startBtn" disabled onclick="startGame()">Start Experiment</button>
    </div>

    <div id="screen-game" class="game-screen">
        <div class="board-track" id="board">
            <div class="tile" id="t0" style="background:var(--accent)">GO</div>
            <div class="tile" id="t1">SO<sub>2</sub></div>
            <div class="tile" id="t2">NaOH</div>
            <div class="tile" id="t3" style="color:var(--pink)">CHANCE</div>
            <div class="tile" id="t11">Ag<sup>+</sup></div>
            <div style="grid-column: span 2; grid-row: span 2; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0.1">
                 <span style="font-size:2rem">🧪</span><small>PHARMAPOLY</small>
            </div>
            <div class="tile" id="t4">PCl<sub>5</sub></div>
            <div class="tile" id="t10">Buffer</div>
            <div class="tile" id="t5">Ni(CO)<sub>4</sub></div>
            <div class="tile" id="t9">O<sub>2</sub><sup>+</sup></div>
            <div class="tile" id="t8">SF<sub>6</sub></div>
            <div class="tile" id="t7" style="color:var(--pink)">CHANCE</div>
            <div class="tile" id="t6">KOH</div>
            
            <div id="piecesContainer"></div>
        </div>

        <div class="center-ui">
            <div class="dice-container" onclick="rollDice()">
                <div id="dice" class="dice">
                    <div class="dice-face face-1">1</div><div class="dice-face face-2">2</div><div class="dice-face face-3">3</div>
                </div>
            </div>
            <h3 id="statusLabel" style="margin:0; color:var(--accent)">WAITING...</h3>
            <button id="rollBtn" class="btn btn-roll" onclick="rollDice()">ROLL DICE</button>
        </div>

        <div class="player-dashboard" id="dashboard"></div>
    </div>
</div>

<div class="question-overlay" id="qOverlay">
    <div class="q-card">
        <h3 style="color:var(--accent); margin-top:0;">RESEARCH TASK</h3>
        <p id="qText"></p><div id="optionsArea"></div>
    </div>
</div>

<script>
    const boardItems = [
        { name: "GO", type: "start" }, { name: "SO2", lvl: 1 }, { name: "NaOH", lvl: 1 }, { type: "chance" },
        { name: "PCl5", lvl: 2 }, { name: "Ni(CO)4", lvl: 2 }, { name: "KOH", lvl: 2 }, { type: "chance" },
        { name: "SF6", lvl: 2 }, { name: "O2+", lvl: 3 }, { name: "Buffer", lvl: 3 }, { name: "Ag+", lvl: 2 }
    ];

    const questions = [
        { lvl: 1, isMCQ: true, text: "Geometry of SO<sub>2</sub>?", options: ["Linear", "Bent", "T-shaped"], correct: "Bent" },
        { lvl: 1, isMCQ: true, text: "Molality is moles per ___?", options: ["Liter Solution", "Kg Solvent", "mL Solvent"], correct: "Kg Solvent" },
        { lvl: 2, isMCQ: true, text: "Hybridisation of P in PCl<sub>5</sub>?", options: ["sp<sup>3</sup>", "sp<sup>3</sup>d", "sp<sup>3</sup>d<sup>2</sup>"], correct: "sp<sup>3</sup>d" },
        { lvl: 3, isMCQ: true, text: "Bond order for O<sub>2</sub><sup>+</sup>?", options: ["1.5", "2.0", "2.5"], correct: "2.5" }
    ];

    let allCharacters = [
        { id: 0, icon: '🐱', name: 'Cat-alyst', active: false },
        { id: 1, icon: '🐶', name: 'Dog-ma', active: false },
        { id: 2, icon: '🦊', name: 'Fox-phate', active: false },
        { id: 3, icon: '🐰', name: 'Bun-sen', active: false }
    ];
    let players = [];
    let turnIndex = 0;
    let isRolling = false;

    function togglePlayer(id) {
        allCharacters[id].active = !allCharacters[id].active;
        document.getElementById('card' + id).classList.toggle('selected');
        const activeCount = allCharacters.filter(c => c.active).length;
        document.getElementById('startBtn').disabled = activeCount < 2;
    }

    function startGame() {
        players = allCharacters.filter(c => c.active).map(c => ({ ...c, pos: 0, pts: 0 }));
        document.getElementById('screen-lobby').style.display = 'none';
        document.getElementById('screen-game').style.display = 'block';
        
        // Create pieces
        const container = document.getElementById('piecesContainer');
        const dash = document.getElementById('dashboard');
        players.forEach((p, idx) => {
            const piece = document.createElement('div');
            piece.id = 'piece' + p.id;
            piece.className = 'player-piece';
            piece.innerText = p.icon;
            container.appendChild(piece);

            const stat = document.createElement('div');
            stat.id = 'stat' + idx;
            stat.className = 'p-stat' + (idx === 0 ? ' active-turn' : '');
            stat.innerHTML = `<span>${p.icon}</span><br><b id="pts${idx}">0</b>`;
            dash.appendChild(stat);
        });
        
        updateStatus();
        updatePieces();
    }

    function rollDice() {
        if (isRolling) return;
        isRolling = true;
        const dice = document.getElementById('dice');
        dice.classList.add('rolling');
        const roll = Math.floor(Math.random() * 3) + 1;

        setTimeout(() => {
            dice.classList.remove('rolling');
            dice.style.transform = roll === 1 ? "rotateY(0deg)" : roll === 2 ? "rotateY(180deg)" : "rotateY(-90deg)";
            setTimeout(() => {
                movePlayer(roll);
                isRolling = false;
            }, 500);
        }, 800);
    }

    function movePlayer(steps) {
        let p = players[turnIndex];
        p.pos = (p.pos + steps) % 12;
        updatePieces();
        setTimeout(() => handleLanding(p), 600);
    }

    function handleLanding(p) {
        const land = boardItems[p.pos];
        if (land.type === "start") { p.pts += 100; endTurn(); }
        else if (land.type === "chance") {
            const win = Math.random() > 0.5;
            p.pts += win ? 50 : -30;
            endTurn();
        } else { showQuestion(land.lvl, p); }
    }

    function showQuestion(lvl, p) {
        const q = questions.filter(qu => qu.lvl === lvl) || questions;
        document.getElementById('qText').innerHTML = q.text;
        document.getElementById('qOverlay').style.display = 'flex';
        const area = document.getElementById('optionsArea');
        area.innerHTML = '';
        q.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = "btn-mcq"; b.innerHTML = opt;
            b.onclick = () => {
                if (opt === q.correct) p.pts += 50; else p.pts -= 20;
                document.getElementById('qOverlay').style.display = 'none';
                endTurn();
            };
            area.appendChild(b);
        });
    }

    function endTurn() {
        document.getElementById('pts' + turnIndex).innerText = players[turnIndex].pts;
        document.getElementById('stat' + turnIndex).classList.remove('active-turn');
        turnIndex = (turnIndex + 1) % players.length;
        document.getElementById('stat' + turnIndex).classList.add('active-turn');
        updateStatus();
    }

    function updateStatus() {
        document.getElementById('statusLabel').innerText = `${players[turnIndex].name.toUpperCase()}'S TURN`;
    }

    function updatePieces() {
        players.forEach((p, idx) => {
            const tile = document.getElementById('t' + p.pos);
            const piece = document.getElementById('piece' + p.id);
            const offsetX = (idx % 2) * 15;
            const offsetY = Math.floor(idx / 2) * 15;
            piece.style.left = (tile.offsetLeft + offsetX) + 'px';
            piece.style.top = (tile.offsetTop + offsetY) + 'px';
        });
    }
</script>
</body>
</html>
